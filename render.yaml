services:
  - type: web
    name: ai-tour-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GEMINI_KEY_3
        sync: false
      - key: GEMINI_KEY_4
        sync: false
      - key: GEMINI_KEY_5
        sync: false
      - key: GEMINI_KEY_6
        sync: false
      - key: GEMINI_KEY_7
        sync: false
      - key: GEMINI_KEY_8
        sync: false
      - key: GEMINI_KEY_9
        sync: false
      - key: GEMINI_KEY_10
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
